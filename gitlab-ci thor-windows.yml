    build_image: "artifactory.osep.stryker.com/docker-dev/qbs-build-tools:windows-python-2.7.16.qt5-15-10.vc16.qtc-4.14.3__10.0.20348.1006"
    
    run_Sonar: "False"
  tags:
    - docker-for-windows
    - stryker
    - ltsc2022
  script:
    - systeminfo
    - echo "" > changelist_code.txt
    - mkdir workspace
