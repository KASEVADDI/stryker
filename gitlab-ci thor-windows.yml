include:
  - project: 'strykercorp/robotics/darlin/templates'
    ref: main
    file: '/perforce.yml'

stages:
  - prepare
  - checkout
  - test
  - changelist_code_stage
  - changelist_data_stage
  - checkout_code_stage
  - quality-gate
  - checkout_data_stage
  - build
  - cleanup
  - tests
  - deploy
  - post


variables:
  OSEP_SYNOPSYS_DETECT_WITH_DOCKER: "false"
  OSEP_SYNOPSYS_DETECT_TOOLS_EXCLUDED: "NONE"
  OSEP_SYNOPSYS_DETECT_INVENTORY_DISABLED: "true"

  container_name: "checkout_code"
  changelist_file: "changelist_code.txt"
  client_name: "${CI_PROJECT_NAME}_code_linux"
  workdir: "/modules/perforce" 

  perforce_image: "artifactory.osep.stryker.com/robotics-docker-dev/voyager/voyager-perforce:0.0.17-windows"
  perforce_image_linux: "artifactory.osep.stryker.com/robotics-docker-dev/voyager/voyager-perforce:0.0.14-ubuntu-20.04"
  P4_STREAM:
      value: "//navigation/thor-hip2.0_release"
      description: "Perforce stream"
  BUILD_PROJECT:
      value: "thor_cthip"
      options:
        - "thor_cthip"
        - "thor_ctknee"
        - "Knee1.0"
        - "knee1.0-sonar"
      description: "Select OS for the build"
  BUILD_OS: "windows"

build:
  stage: build
  timeout: 4h
  variables:
    GIT_STRATEGY:                   clone
    GIT_SUBMODULE_STRATEGY:         recursive
    container_name: "checkout_code"
    changelist_file: "changelist_code.txt"
    client_name: "${CI_PROJECT_NAME}_code123"
    workdir: "C:/src"
  tags:
    - docker-for-windows
    - stryker
  script:
    #systeminfo
    - systeminfo
    - echo "" > changelist_code.txt
    - mkdir workspace
    - ls
    - docker login --username ${ARTIFACTORY_STRYKER_USER} --password ${ARTIFACTORY_STRYKER_KEY} artifactory.osep.stryker.com
    - docker run --rm --name=${container_name} -v ${CI_PROJECT_DIR}:${workdir} -w "${workdir}/modules/perforce" -e PYTHONDONTWRITEBYTECODE=1 --entrypoint=python -t ${perforce_image} checkout.py --p4port ${P4PORT} --p4user ${P4USER} --p4passwd ${P4PASSWD} --stream ${P4_STREAM} --dest c:/src/workspace --name ${client_name} --output /src/changelist_code.txt
    - cd "$CI_PROJECT_DIR/workspace"
    - cp ../build.bat .
    - docker-compose  --verbose  -f docker-compose.linux.yml -p release-build run -e project=./start_thor_ctknee.py  -e build_type=release -e build_dir=c:\\build_thor -e target=win64-vc16-qt5-15-10   --rm --entrypoint="c:/temp/build.bat" msvc16-qt
  after_script:
    - docker network rm release-build_default
    - cd $CI_PROJECT_DIR
    - docker run --rm  -v ${CI_PROJECT_DIR}:${workdir} -w "${workdir}/modules/perforce" -e PYTHONDONTWRITEBYTECODE=1 --entrypoint=python -t ${perforce_image} remove_client.py --p4port ${P4PORT} --p4user ${P4USER} --p4passwd ${P4PASSWD} --p4client ${client_name}
    #- Remove-Item -Path "$CI_PROJECT_DIR/workspace/" -Recurse -Force
  rules:
   - if: '$BUILD_PROJECT != "Knee1.0" && $BUILD_PROJECT != "knee1.0-sonar"'

knee1-0_build:
