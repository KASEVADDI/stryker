clone-cthip1.0-Master-Linux:
  tags:
    #- SGTC-Linux-Laptop
    - linux
    - stryker
    - docker-for-windows
  variables:
    gitlabDockerPerforce:  "gitlab-darlin_perforce"
    workdir:             c:/src
    buildToolsImage: "artifactory.osep.stryker.com/robotics-docker-dev/voyager/voyager-perforce:0.0.13-ubuntu-20.04"
    #docker_build_image:  artifactory.osep.stryker.com/osep-docker-dev/strykercorp/osep/osep-cpp-build-tools:0.1.26-msvc15-windows-ltsc2019
  script:
    #- p4 changes -m 1 $STREAM
    #- CHANGELIST_NUM=$(p4 changes -m 1 $STREAM | awk '{print $2}')
    #- echo $CHANGELIST_NUM
    #- p4 sync $STREAM > log.txt
    - P4PORT=fri4proxy01.strykercorp.com:1999
    - echo "$P4PORT"
    - export docksLinuxUserId=$UID
    - echo $docksLinuxUserId
    - export docksLinuxGroupID=$(eval id -rg)
    - echo "docksLinuxGroupID" $docksLinuxGroupID
    - |-
      if [ "$( docker container inspect -f '{{.State.Status}}' $gitlabDockerPerforce )" = "exited" ]; then
        echo "XXXXXXXXXXXXXXXX DOCKER IS Exited, REMOVE"
        docker rm -f $gitlabDockerPerforce
      fi 

    - |-
      if [ "$( docker container inspect -f '{{.State.Running}}' $gitlabDockerPerforce )" = "true" ]; then
        echo "XXXXXXXXXXXXXXXX DOCKER IS RUNNING, STOP AND REMOVE"
        docker stop $gitlabDockerPerforce; docker rm $gitlabDockerPerforce
      fi 

    - docker login --username ${ARTIFACTORY_STRYKER_USER} --password ${ARTIFACTORY_STRYKER_KEY} artifactory.osep.stryker.com/robotics-docker-dev
    - docker run --name $gitlabDockerPerforce -t -d --user $UID:$docksLinuxGroupID -w ${workdir} -v ${CI_PROJECT_DIR}:${workdir} -e P4USER -e P4PASSWD  --entrypoint=cat ${buildToolsImage}
    - pwd
    - docker exec -t --user 0:0 -d $gitlabDockerPerforce bash -cv 'adduser -u $docksLinuxUserId dock-gitlab-runner'
    - echo "XXXXXXXXXXXX START OF P4 COMMANDS! $(eval $curDate)"
    - docker exec -t -d $gitlabDockerPerforce bash -cv 'echo $P4PASSWD | p4 login'
    - chmod +x src/apps/stp/darlin/ci/build_linux.sh
    - docker login --username ${ARTIFACTORY_STRYKER_USER} --password ${ARTIFACTORY_STRYKER_KEY} artifactory.osep.stryker.com
    - docker-compose -f docker-compose.linux.yml run --user 1000:1000 -e execute_coverage=false -e project=./start_thor_cthip.py -e build_type=release -e build_dir=build -e build_spk=create_thor_cthip_spk -e target=win64-vc16-qt5-15-10  -e buildflag="project.productionBuild:false"  -e spkbuildflag="project.buildSPK:true"  --rm --entrypoint="/bin/bash -c ./src/apps/stp/darlin/ci/build_linux.sh" ubuntu-20-qt-6.x
  rules:
    - when: never