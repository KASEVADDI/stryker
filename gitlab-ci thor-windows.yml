      docker run --rm -v "${PWD}:C:/temp" ${build_image} powershell -Command "if (Test-Path 'C:\temp\install-root') { Compress-Archive -Path 'C:\temp\install-root\*' -DestinationPath 'C:\temp\install-root.zip' -Force; Write-Host 'install-root.zip created' } else { Write-Error 'install-root folder not found'; exit 1 }"
