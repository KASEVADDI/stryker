    - cd "$CI_PROJECT_DIR/workspace"
    - cp ../build-knee1-0.bat .
    - |
      if ( ${env:BUILD_PROJECT} -eq "knee1.0-sonar" ) {
        ${env:run_Sonar} = "True"
      } 
    - docker run --rm -v "${PWD}:C:/temp" -e run_Sonar -e SONAR_AUTH_TOKEN -e project=start_thor_ctknee.py  -e build_type=release -e build_dir=c:\\build_thor -e target=win64-vc16-qt5-15-10 -e buildflag="project.productionBuild:true"  --entrypoint="C:/temp/build-knee1-0.bat" ${build_image}
